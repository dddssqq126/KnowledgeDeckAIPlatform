services:
  frontend:
    container_name: knowledgedeck_frontend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - backend

  backend:
    container_name: knowledgedeck_backend
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Read PPTX artifacts that Presenton wrote without proxying via HTTP.
      - presenton_data:/presenton_data:ro
      # Local filesystem object storage mount.
      - local_storage_data:/var/lib/knowledgedeck-storage
    depends_on:
      qdrant:
        condition: service_started

  qdrant:
    container_name: knowledgedeck_qdrant
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  presenton:
    container_name: knowledgedeck_presenton
    image: ghcr.io/presenton/presenton:latest
    environment:
      LLM: custom
      CUSTOM_LLM_URL: ${LLM_BASE_URL}
      CUSTOM_LLM_API_KEY: ${LLM_API_KEY}
      CUSTOM_MODEL: ${LLM_MODEL}
      # mem0 (Presenton's memory layer) hard-codes a lookup for OPENAI_API_KEY
      # at init even when we use a custom LLM. A placeholder value satisfies
      # the constructor; mem0's actual outbound calls go through CUSTOM_LLM_URL.
      OPENAI_API_KEY: ${LLM_API_KEY}
      AUTH_USERNAME: ${PRESENTON_USERNAME:-admin}
      AUTH_PASSWORD: ${PRESENTON_PASSWORD:-change-me-please}
      DISABLE_IMAGE_GENERATION: "true"
    ports:
      - "5001:80"
    volumes:
      - presenton_data:/app_data

  vllm_chat:
    container_name: knowledgedeck_vllm_chat
    image: vllm/vllm-openai:v0.19.1-x86_64-cu130
    profiles: ["gpu"]
    ipc: host
    ports:
      - "${VLLM_CHAT_PORT:-8000}:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    command:
      - --model
      - ${LLM_MODEL:-google/gemma-4-E4B-it}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_CHAT_GPU_MEMORY_UTILIZATION:-0.70}
      - --max-model-len
      - ${VLLM_CHAT_MAX_MODEL_LEN:-16384}
      # vLLM 0.19+ requires JSON for --limit-mm-per-prompt. We disable
      # image/audio inputs because the chat flow is text-only.
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0}'
    deploy:
      resources:
        reservations:
          devices:
            # All three vLLM services share GPU_DEVICE (default 0). Override
            # in .env to spread across multiple GPUs.
            - driver: nvidia
              device_ids:
                - "${GPU_DEVICE:-0}"
              capabilities: [gpu]

  vllm_embedding:
    container_name: knowledgedeck_vllm_embedding
    image: vllm/vllm-openai:v0.19.1-x86_64-cu130
    profiles: ["gpu"]
    ipc: host
    ports:
      - "${VLLM_EMBEDDING_PORT:-8001}:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    command:
      - --model
      - ${EMBEDDING_MODEL:-BAAI/bge-m3}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_EMBEDDING_GPU_MEMORY_UTILIZATION:-0.08}
      - --max-model-len
      - ${VLLM_EMBEDDING_MAX_MODEL_LEN:-8192}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "${GPU_DEVICE:-0}"
              capabilities: [gpu]

  # Cross-encoder reranker. Runs vLLM in `--task=score` mode so the
  # `/v1/score` endpoint pairs (query, passage) and returns relevance
  # scores. Used to re-order Qdrant's top-N dense hits before they hit
  # the LLM prompt. Lives on its own GPU (default: GPU 3, the empty one)
  # so it doesn't compete with the chat model for memory.
  vllm_rerank:
    container_name: knowledgedeck_vllm_rerank
    image: vllm/vllm-openai:v0.19.1-x86_64-cu130
    profiles: ["gpu"]
    ipc: host
    ports:
      - "${VLLM_RERANK_PORT:-8002}:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    command:
      - --model
      - ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      # vLLM 0.19 dropped --task. For cross-encoder rerankers we use
      # --runner pooling + --convert classify so the /score endpoint
      # exposes (query, passage) pairwise scoring.
      - --runner
      - pooling
      - --convert
      - classify
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_RERANK_GPU_MEMORY_UTILIZATION:-0.08}
      - --max-model-len
      - ${VLLM_RERANK_MAX_MODEL_LEN:-2048}
    deploy:
      resources:
        reservations:
          devices:
            # Pin to the same GPU as chat + embedding to keep all vLLM
            # services on a single device. Override via VLLM_RERANK_GPU_DEVICE
            # in .env if you want to spread across GPUs (e.g. set to "3").
            - driver: nvidia
              device_ids:
                - "${VLLM_RERANK_GPU_DEVICE:-0}"
              capabilities: [gpu]

volumes:
  qdrant_data:
  presenton_data:
  local_storage_data:
  hf_cache:

# Override the auto-created "<project>_default" network with an explicit
# name + pinned subnet. Pinning the CIDR avoids range collisions on hosts
# running multiple compose stacks. All services inherit this automatically
# (no per-service `networks:` line needed) because we override `default`.
networks:
  default:
    name: knowledgedeck_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.39.0.0/16
